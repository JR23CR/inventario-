            // --- LÓGICA DE NEGOCIO ---
            const handleSearch = (e) => {
                const term = e.target.value.toUpperCase();
                setSearchTerm(term);
                
                if (isScannerMode) {
                    const exactMatches = inventory.filter(i => i.inventoryNum === term);
                    if (exactMatches.length > 0) {
                        const bodegaMatch = exactMatches.find(i => isStored(i.manager));
                        openAssetControl(bodegaMatch || exactMatches[0]);
                        setSearchTerm('');
                    }
                }
            };

            const openAssetControl = (asset) => {
                setActiveAsset(asset);
                setIsEditing(false);
                setActionForm({ person: '', area: '', quantity: asset.quantity, notes: '', returnStatus: 'Activo', stockToAdd: 1, transferWarehouse: '' });
            };

            const handleCreate = async (e) => {
                e.preventDefault();
                const now = new Date().toLocaleString();
                const newRecord = { 
                    ...formData, 
                    id: Date.now(), 
                    inventoryNum: nextId, 
                    manager: 'BODEGA', 
                    area: 'ALMACENAMIENTO',
                    date: now,
                    history: `${now}: ALTA EN ${formData.warehouse} | `
                };

                // Actualización Optimista (Local)
                const updatedInventory = [...inventory, newRecord];
                setInventory(updatedInventory);
                setNextId(`${PREFIX}-${String(parseInt(nextId.split('-')[1]) + 1).padStart(PADDING, '0')}`);
                setFormData({ ...formData, description: '', brand: '', measurement: '', color: '', quantity: 1 });

                // Guardar en Nube
                if (APP_SCRIPT_URL) {
                    fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            tipo: "guardar_activos",
                            activos: [newRecord]
                        })
                    }).catch(err => console.error("Error guardando en nube:", err));
                }

                if (characteristic) {
                    await printLabel(newRecord);
                } else if (confirm("¿Imprimir etiqueta en PC?")) {
                    printLabelPC(newRecord);
                }
            };

            const startEditing = () => {
                setEditForm({ ...activeAsset });
                setIsEditing(true);
            };

            const handleUpdateAsset = async () => {
                if (!editForm.description) return alert("Descripción requerida");

                const updatedAsset = { ...activeAsset, ...editForm };
                
                // Actualizar localmente
                const newInventory = inventory.map(item => item.id === updatedAsset.id ? updatedAsset : item);
                setInventory(newInventory);
                setActiveAsset(updatedAsset);
                setIsEditing(false);

                // Guardar en Nube
                if (APP_SCRIPT_URL) {
                    fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            tipo: "guardar_activos",
                            activos: [updatedAsset]
                        })
                    }).catch(err => console.error("Error guardando edición:", err));
                }
                alert("✅ Activo actualizado correctamente.");
            };

            const handleAddStock = async () => {
                if (!activeAsset) return;
                const qtyToAdd = parseInt(actionForm.stockToAdd);
                
                if (isNaN(qtyToAdd) || qtyToAdd <= 0) return alert("Cantidad inválida");
                
                const now = new Date().toLocaleString();
                const newInventory = [...inventory];
                const index = newInventory.findIndex(i => i.id === activeAsset.id);
                
                if (index === -1) return;
                
                const updatedAsset = { ...newInventory[index] };
                updatedAsset.quantity += qtyToAdd;
                updatedAsset.history += ` ${now}: INGRESO DE ${qtyToAdd} UNID. (REPOSICIÓN) |`;
                
                newInventory[index] = updatedAsset;
                setInventory(newInventory);
                setActiveAsset(null);
                
                if (APP_SCRIPT_URL) {
                    fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            tipo: "guardar_activos",
                            activos: [updatedAsset]
                        })
                    }).catch(err => console.error(err));
                }
                alert("Stock actualizado correctamente.");
            };

            // --- LÓGICA DE SELECCIÓN MÚLTIPLE ---
            const toggleSelection = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };

            const handleSelectAll = () => {
                if (selectedIds.size === filteredList.length) {
                    setSelectedIds(new Set());
                } else {
                    const newSet = new Set(filteredList.map(i => i.id));
                    setSelectedIds(newSet);
                }
            };

            const openBulkModal = () => {
                // Inicializar cantidades a 1 por defecto para cada ítem seleccionado
                const initialQuantities = {};
                selectedIds.forEach(id => {
                    const item = inventory.find(i => i.id === id);
                    if (item) initialQuantities[id] = 1; // Por defecto despachar 1 unidad
                });
                setBulkQuantities(initialQuantities);
                setBulkForm({ person: '', area: '', notes: '' });
                setIsBulkModalOpen(true);
            };

            const handleBulkSubmit = async () => {
                if (!bulkForm.person) return alert("Debes indicar el responsable.");
                
                const now = new Date().toLocaleString();
                const targetManager = bulkForm.person.toUpperCase();
                const targetArea = DEFAULT_ASSIGNMENTS[targetManager] || bulkForm.area.toUpperCase();
                const targetWarehouse = 'EN CAMPO';
                
                let newInventory = [...inventory];
                let itemsToSync = [];

                // Procesar cada ítem seleccionado
                for (const id of selectedIds) {
                    const originalIndex = newInventory.findIndex(i => i.id === id);
                    if (originalIndex === -1) continue;

                    const asset = newInventory[originalIndex];
                    const qtyToMove = parseInt(bulkQuantities[id] || 1);
                    
                    if (qtyToMove <= 0 || qtyToMove > asset.quantity) continue; // Saltar inválidos

                    const moveLog = `${now}: ENTREGADO ${qtyToMove} UNID. A ${targetManager} |`;

                    // Lógica de movimiento (similar a handleMovement pero simplificada para asignación)
                    if (qtyToMove < asset.quantity) {
                        // División (Split)
                        newInventory[originalIndex] = { ...asset, quantity: asset.quantity - qtyToMove };
                        itemsToSync.push(newInventory[originalIndex]);

                        const newAsset = {
                            ...asset,
                            id: Date.now() + Math.random(), // ID temporal único
                            quantity: qtyToMove,
                            manager: targetManager,
                            area: targetArea,
                            warehouse: targetWarehouse,
                            dateEntrega: now,
                            history: `${asset.history} ${moveLog}`,
                            observations: bulkForm.notes ? `${asset.observations} [${bulkForm.notes}]` : asset.observations
                        };
                        newInventory.push(newAsset);
                        itemsToSync.push(newAsset);
                    } else {
                        // Movimiento Total
                        newInventory[originalIndex] = {
                            ...asset,
                            manager: targetManager,
                            area: targetArea,
                            warehouse: targetWarehouse,
                            dateEntrega: now,
                            history: asset.history + " " + moveLog,
                            observations: bulkForm.notes ? `${asset.observations} [${bulkForm.notes}]` : asset.observations
                        };
                        itemsToSync.push(newInventory[originalIndex]);
                    }
                }

                setInventory(newInventory);
                setSelectedIds(new Set());
                setIsBulkModalOpen(false);

                if (APP_SCRIPT_URL && itemsToSync.length > 0) {
                    fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ tipo: "guardar_activos", activos: itemsToSync })
                    }).catch(err => console.error(err));
                }
                alert("✅ Despacho masivo completado.");
            };

            const handleBulkPrint = () => {
                const itemsToPrint = [];
                selectedIds.forEach(id => {
                    const item = inventory.find(i => i.id === id);
                    if (item) itemsToPrint.push(item);
                });
                printLabelPC(itemsToPrint);
            };

            const handleMovement = async (type) => {
              try {
                if (!activeAsset) return;
                
                const qtyToMove = parseInt(actionForm.quantity);
                if (isNaN(qtyToMove) || qtyToMove <= 0) return alert("Cantidad inválida");
                if (qtyToMove > activeAsset.quantity) return alert("No puedes mover más de lo que existe.");

                const now = new Date().toLocaleString();
                let newInventory = [...inventory];
                let moveLog = "";
                let targetManager, targetArea, targetWarehouse, targetStatus, targetDateMalEstado;
                let labelToPrint = null; 
                let itemsToSync = []; // Items para guardar en nube
                
                if (type === 'ASSIGN') {
                    targetManager = (actionForm.person || '').toUpperCase();
                    targetArea = (actionForm.area || DEFAULT_ASSIGNMENTS[targetManager] || '').toUpperCase();
                    targetWarehouse = 'EN CAMPO';
                    targetStatus = activeAsset.status;
                    targetDateMalEstado = activeAsset.dateMalEstado;
                    moveLog = `${now}: ENTREGADO ${qtyToMove} UNID. A ${targetManager} (${targetArea}) |`;
                    printDeliveryLetter(activeAsset, targetManager, targetArea, qtyToMove); // Disparar impresión de carta
                } else if (type === 'TRANSFER') {
                    targetManager = 'BODEGA';
                    targetArea = 'ALMACENAMIENTO';
                    targetWarehouse = actionForm.transferWarehouse;
                    targetStatus = activeAsset.status;
                    targetDateMalEstado = activeAsset.dateMalEstado;
                    moveLog = `${now}: TRASLADO DE ${qtyToMove} UNID. A ${targetWarehouse} |`;
                } else { 
                    targetManager = 'BODEGA';
                    targetArea = 'ALMACENAMIENTO';
                    targetWarehouse = actionForm.area || 'OFICINA';
                    targetStatus = actionForm.returnStatus;
                    targetDateMalEstado = targetStatus === 'Mal Estado' ? now : '';
                    moveLog = `${now}: DEVUELTO ${qtyToMove} UNID. A ${targetWarehouse} (${targetStatus}) |`;
                }

                if (qtyToMove < activeAsset.quantity) {
                    const originalIndex = newInventory.findIndex(i => i.id === activeAsset.id);
                    
                    if (originalIndex === -1) {
                        throw new Error("No se encontró el activo original en el inventario local.");
                    }

                    newInventory[originalIndex] = {
                        ...activeAsset,
                        quantity: activeAsset.quantity - qtyToMove
                    };
                    itemsToSync.push(newInventory[originalIndex]);

                    const existingDestIndex = newInventory.findIndex(i => 
                        i.inventoryNum === activeAsset.inventoryNum && 
                        i.manager === targetManager &&
                        i.warehouse === targetWarehouse &&
                        i.status === targetStatus 
                    );

                    if (existingDestIndex >= 0) {
                        newInventory[existingDestIndex].quantity += qtyToMove;
                        newInventory[existingDestIndex].history += ` ${moveLog}`;
                        newInventory[existingDestIndex].observations = actionForm.notes ? `${newInventory[existingDestIndex].observations} [${actionForm.notes}]` : newInventory[existingDestIndex].observations;
                        if(targetStatus === 'Mal Estado') newInventory[existingDestIndex].dateMalEstado = now;
                        labelToPrint = newInventory[existingDestIndex];
                        itemsToSync.push(newInventory[existingDestIndex]);
                    } else {
                        const newAsset = {
                            ...activeAsset,
                            id: Date.now(),
                            quantity: qtyToMove,
                            manager: targetManager,
                            area: targetArea,
                            warehouse: targetWarehouse,
                            status: targetStatus,
                            dateEntrega: type === 'ASSIGN' ? now : '',
                            dateMalEstado: targetDateMalEstado,
                            history: `${activeAsset.history} ${moveLog}`,
                            observations: actionForm.notes ? `${activeAsset.observations} [${actionForm.notes}]` : activeAsset.observations
                        };
                        newInventory.push(newAsset);
                        labelToPrint = newAsset;
                        itemsToSync.push(newAsset);
                    }

                } else {
                    const existingDestIndex = newInventory.findIndex(i => 
                        i.inventoryNum === activeAsset.inventoryNum && 
                        i.manager === targetManager &&
                        i.warehouse === targetWarehouse &&
                        i.status === targetStatus &&
                        i.id !== activeAsset.id 
                    );

                    if (existingDestIndex >= 0) {
                        newInventory[existingDestIndex].quantity += qtyToMove;
                        newInventory[existingDestIndex].history += ` ${moveLog}`;
                        if(targetStatus === 'Mal Estado') newInventory[existingDestIndex].dateMalEstado = now;
                        
                        // CORRECCIÓN: Enviar el activo origen con cantidad 0 a la nube para que se actualice
                        const sourceToSync = { ...activeAsset, quantity: 0, history: activeAsset.history + " " + moveLog };
                        itemsToSync.push(sourceToSync);
                        
                        labelToPrint = newInventory[existingDestIndex];
                        itemsToSync.push(newInventory[existingDestIndex]);
                        
                        // Eliminar localmente
                        newInventory = newInventory.filter(i => i.id !== activeAsset.id);
                    } else {
                        const index = newInventory.findIndex(i => i.id === activeAsset.id);
                        if (index === -1) {
                             throw new Error("No se encontró el activo para mover (ID mismatch).");
                        }

                        newInventory[index] = {
                            ...activeAsset,
                            manager: targetManager,
                            area: targetArea,
                            warehouse: targetWarehouse,
                            status: targetStatus,
                            dateEntrega: type === 'ASSIGN' ? now : '',
                            dateMalEstado: targetDateMalEstado,
                            history: activeAsset.history + " " + moveLog,
                            observations: actionForm.notes ? `${activeAsset.observations} [${actionForm.notes}]` : activeAsset.observations
                        };
                        labelToPrint = newInventory[index];
                        itemsToSync.push(newInventory[index]);
                    }
                }

                setInventory(newInventory);
                setActiveAsset(null);

                // Sync Cloud
                if (APP_SCRIPT_URL && itemsToSync.length > 0) {
                    fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            tipo: "guardar_activos",
                            activos: itemsToSync
                        })
                    }).catch(err => console.error("Error sincronizando movimiento:", err));
                }

                // Solo preguntar/imprimir en devoluciones, no en entregas.
                if (type === 'RETURN') {
                    if (characteristic && labelToPrint) {
                        await printLabel(labelToPrint);
                    } else if (labelToPrint && confirm("¿Imprimir etiqueta actualizada en PC?")) {
                        printLabelPC(labelToPrint);
                    }
                }
              } catch (e) {
                  console.error(e);
                  alert("Error al procesar movimiento: " + e.message);
              }
            };

            const stats = useMemo(() => {
                const available = inventory.filter(i => isStored(i.manager));
                const assigned = inventory.filter(i => !isStored(i.manager));
                return {
                    total: inventory.reduce((acc, curr) => acc + (parseInt(curr.quantity) || 0), 0),
                    bodega: available.length,
                    asignado: assigned.length,
                    bajoStock: available.filter(i => i.quantity <= LOW_STOCK_THRESHOLD).length,
                    items: inventory.length
                };
            }, [inventory]);

            const filteredList = useMemo(() => {
                return inventory.filter(item => {
                    if (item.quantity <= 0) return false; // Ocultar ítems con cantidad 0
                    const matchSearch = JSON.stringify(item).toUpperCase().includes(searchTerm);
                    if (viewMode === 'BODEGA') return matchSearch && isStored(item.manager);
                    if (viewMode === 'ASIGNADO') return matchSearch && !isStored(item.manager);
                    if (viewMode === 'BAJO_STOCK') return matchSearch && isStored(item.manager) && item.quantity <= LOW_STOCK_THRESHOLD;
                    if (viewMode === 'ALL') return matchSearch;
                    return matchSearch;
                }).reverse();
            }, [inventory, searchTerm, viewMode]);

            const exportToCSV = () => {
                const headers = ["Codigo", "Descripcion", "Marca", "Medida", "Color", "Categoria", "Estado", "Ubicacion", "Responsable", "Area", "Cantidad", "Historial"];
                const rows = filteredList.map(i => [
                    i.inventoryNum, i.description, i.brand, i.measurement || '', i.color || '', i.category, i.status, 
                    isStored(i.manager) ? i.warehouse : 'EN CAMPO',
                    i.manager, i.area, i.quantity, i.history
                ]);
                const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `Inventario_GB_${new Date().toLocaleDateString()}.csv`);
                link.click();
            };

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden font-sans text-slate-900 selection:bg-blue-500 selection:text-white">
                    
                    {/* --- SIDEBAR --- */}
                    <aside className="w-20 lg:w-64 bg-slate-900 flex flex-col p-4 text-white z-50 transition-all">
                        <div className="flex items-center gap-3 mb-10 lg:px-2">
                            <div className="bg-blue-600 p-2.5 rounded-2xl shadow-lg">
                                <Package size={24} />
                            </div>
                            <div className="hidden lg:block">
                                <h1 className="font-black text-lg leading-tight tracking-tight">GIBOR S.A.</h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Activos</p>
                            </div>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <SideItem icon={<LayoutDashboard size={20}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <SideItem icon={<Box size={20}/>} label="Inventario" active={activeTab === 'inventory'} onClick={() => setActiveTab('inventory')} />
                            <SideItem icon={<History size={20}/>} label="Historial" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                        </nav>
                        <div className="mt-auto">
                            <SideItem icon={<ArrowLeft size={20}/>} label="Volver al Inicio" onClick={() => window.location.href = 'index.html'} />
                        </div>
                    </aside>

                    {/* --- MAIN CONTENT --- */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-20">
                            <div className="flex-1 max-w-2xl">
                                <div className="relative">
                                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                                    <input 
                                        type="text" 
                                        placeholder="Buscar activo..."
                                        className="w-full pl-12 pr-4 py-3 bg-slate-100 rounded-2xl outline-none text-sm font-medium focus:ring-4 focus:ring-blue-50 transition-all uppercase"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                            <div className="flex items-center gap-4 ml-8">
                                <button onClick={() => setIsScannerMode(!isScannerMode)} className={`p-3 rounded-2xl transition-all ${isScannerMode ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`} title="Modo Escáner">
                                    <ScanLine size={24} />
                                </button>
                                <button onClick={() => setIsAddModalOpen(true)} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase hover:bg-blue-700 shadow-xl flex items-center gap-2 transition-all">
                                    <Plus size={18} /> Nuevo
                                </button>
                            </div>
                        </header>

                        {/* --- FILTROS DE VISTA (Solo en Tab Inventario) --- */}
                        {activeTab === 'inventory' && (
                            <div className="bg-white border-b border-slate-200 px-8 py-4 flex items-center gap-2 shrink-0 overflow-x-auto no-scrollbar">
                                <FilterTab label="Disponibles" count={stats.bodega} active={viewMode === 'BODEGA'} onClick={() => setViewMode('BODEGA')} icon={<Inbox size={16}/>} />
                                <FilterTab label="Asignados" count={stats.asignado} active={viewMode === 'ASIGNADO'} onClick={() => setViewMode('ASIGNADO')} icon={<User size={16}/>} />
                                <FilterTab label="Alertas" count={stats.bajoStock} active={viewMode === 'BAJO_STOCK'} onClick={() => setViewMode('BAJO_STOCK')} icon={<AlertTriangle size={16}/>} />
                                <FilterTab label="Ver Todo" count={stats.items} active={viewMode === 'ALL'} onClick={() => setViewMode('ALL')} icon={<Layers size={16}/>} />
                                
                                <div className="ml-auto flex items-center gap-3">
                                    <button onClick={connectPrinter} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold transition-all border ${printer ? 'bg-green-50 border-green-500 text-green-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                        <Bluetooth size={16} /> {printer ? 'IMPRESORA LISTA' : 'SYNC BT'}
                                    </button>
                                    <button onClick={exportToCSV} className="flex items-center gap-2 px-4 py-2 bg-white rounded-xl text-xs font-black text-slate-600 hover:bg-slate-50 border border-slate-200 uppercase shadow-sm">
                                        <Download size={14}/> CSV
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- ÁREA DE CONTENIDO DINÁMICO --- */}
                        <div className="flex-1 overflow-y-auto p-8 scroll-smooth custom-scrollbar">
                            {activeTab === 'dashboard' ? (
                                <DashboardView stats={stats} />
                            ) : activeTab === 'history' ? (
                                <HistoryView historyData={historyData} historySearch={historySearch} setHistorySearch={setHistorySearch} onPrint={printHistoryReport} />
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8 pb-24 animate-in fade-in duration-500">
                                    {loading ? (
                                        Array(8).fill(0).map((_, i) => <SkeletonCard key={i} />)
                                    ) : (
                                        filteredList.map(item => (
                                            <AssetCard 
                                                key={item.id} 
                                                asset={item} 
                                                isSelected={selectedIds.has(item.id)}
                                                isStored={isStored(item.manager || item.RESPONSABLE)}
                                                onSelect={(e) => {
                                                    e.stopPropagation();
                                                    toggleSelection(item.id);
                                                }}
                                                onClick={() => openAssetControl(item)} 
                                                onPrintLetter={() => printDeliveryLetter(item, item.manager || item.RESPONSABLE, item.area || item.AREA || item.DEPARTAMENTO, item.quantity)}
                                            />
                                        ))
                                    )}
                                </div>
                            )}
                        </div>

                        {/* --- BARRA FLOTANTE DE ACCIÓN MASIVA --- */}
                        {selectedIds.size > 0 && (
                            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-6 z-50 animate-in fade-in slide-in-from-bottom-4">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">
                                        {selectedIds.size}
                                    </div>
                                    <span className="font-bold text-sm">Ítems Seleccionados</span>
                                </div>
                                <div className="h-8 w-px bg-slate-700"></div>
                                <button onClick={openBulkModal} className="bg-white text-slate-900 hover:bg-blue-50 px-4 py-2 rounded-xl font-black text-xs uppercase tracking-widest transition-all flex items-center gap-2">
                                    <CheckSquare size={16} /> Despachar Cargos
                                </button>
                                <button onClick={handleBulkPrint} className="bg-slate-700 text-white hover:bg-slate-600 px-4 py-2 rounded-xl font-black text-xs uppercase tracking-widest transition-all flex items-center gap-2">
                                    <Printer size={16} /> Etiquetas (PC)
                                </button>
                                <button onClick={() => setSelectedIds(new Set())} className="text-slate-400 hover:text-white transition-colors">
                                    <X size={20} />
                                </button>
                            </div>
                        )}

                        {/* --- DRAWER DE GESTIÓN (REEMPLAZA MODAL) --- */}
                        <AssetDrawer 
                            asset={activeAsset} 
                            isStored={activeAsset ? isStored(activeAsset.manager || activeAsset.RESPONSABLE) : false}
                            onClose={() => setActiveAsset(null)} 
                            onPrintPC={() => printLabelPC(activeAsset)}
                            onPrintBT={() => printLabel(activeAsset)}
                            onPrintLetter={() => printDeliveryLetter(activeAsset, activeAsset.manager || activeAsset.RESPONSABLE, activeAsset.area || activeAsset.AREA || activeAsset.DEPARTAMENTO, activeAsset.quantity)}
                            actionForm={actionForm}
                            setActionForm={setActionForm}
                            handleMovement={handleMovement}
                            handleAddStock={handleAddStock}
                            isEditing={isEditing}
                            setIsEditing={setIsEditing}
                            editForm={editForm}
                            setEditForm={setEditForm}
                            handleUpdateAsset={handleUpdateAsset}
                            startEditing={startEditing}
                        />

                        {/* --- MODAL DE ALTA --- */}
                        {isAddModalOpen && (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={(e) => { if (e.target === e.currentTarget) setIsAddModalOpen(false); }}>
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-200 w-full max-w-md animate-in zoom-in duration-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-sm font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                            <Plus size={16} className="text-blue-600" /> Alta de Activo
                                        </h2>
                                        <button onClick={() => setIsAddModalOpen(false)} className="text-slate-400 hover:text-slate-600"><X/></button>
                                    </div>
                                    <form onSubmit={handleCreate} className="space-y-4">
                                        <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center flex justify-between items-center px-6">
                                            <span className="text-[10px] font-bold text-blue-400">SIGUIENTE ID</span>
                                            <span className="font-mono font-black text-2xl text-blue-600">{nextId}</span>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Categoría</label>
                                            <input list="categories-list" type="text" placeholder="CATEGORÍA" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value.toUpperCase()})} className="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl p-3.5 font-bold uppercase outline-none focus:ring-4 focus:ring-blue-50 transition-all" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Descripción</label>
                                            <input type="text" placeholder="DESCRIPCIÓN DEL EQUIPO" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value.toUpperCase()})} className="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl p-3.5 font-bold uppercase outline-none focus:ring-4 focus:ring-blue-50 transition-all" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="MARCA" value={formData.brand} onChange={e => setFormData({...formData, brand: e.target.value.toUpperCase()})} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl p-3.5 font-bold uppercase outline-none" />
                                            <input type="text" placeholder="MEDIDA" value={formData.measurement} onChange={e => setFormData({...formData, measurement: e.target.value.toUpperCase()})} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl p-3.5 font-bold uppercase outline-none" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <select value={formData.warehouse} onChange={e => setFormData({...formData, warehouse: e.target.value})} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl p-3.5 font-bold uppercase outline-none">
                                                {BODEGAS_LIST.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                            <input type="number" min="1" value={formData.quantity} onChange={e => setFormData({...formData, quantity: parseInt(e.target.value)})} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl p-3.5 font-bold text-center outline-none" />
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest transition-all shadow-xl shadow-blue-200">
                                            Registrar e Imprimir
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* --- MODAL DE DESPACHO MASIVO --- */}
                        {isBulkModalOpen && (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={(e) => { if (e.target === e.currentTarget) setIsBulkModalOpen(false); }}>
                                <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-4xl border border-gray-200 overflow-hidden flex flex-col max-h-[90vh] animate-in zoom-in duration-200">
                                    <div className="bg-slate-900 p-8 flex justify-between items-center">
                                        <h2 className="text-xl font-black text-white flex items-center gap-3">
                                            <CheckSquare className="text-blue-400"/> Despacho Masivo de Cargos
                                        </h2>
                                        <button onClick={() => setIsBulkModalOpen(false)} className="text-slate-400 hover:text-white p-2"><X size={24}/></button>
                                    </div>
                                    
                                    <div className="flex-1 overflow-hidden flex flex-col md:flex-row">
                                        <div className="p-8 md:w-1/3 bg-slate-50 border-r border-slate-200 space-y-6 overflow-y-auto">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Responsable</label>
                                                <input list="staff-list" className="w-full mt-1 bg-white border border-slate-200 rounded-2xl p-4 text-sm font-bold uppercase outline-none focus:ring-4 focus:ring-blue-100" 
                                                    value={bulkForm.person} onChange={e => setBulkForm({...bulkForm, person: e.target.value})} placeholder="BUSCAR PERSONA..." />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Área de Destino</label>
                                                <input className="w-full mt-1 bg-white border border-slate-200 rounded-2xl p-4 text-sm font-bold uppercase outline-none focus:ring-4 focus:ring-blue-100" 
                                                    value={DEFAULT_ASSIGNMENTS[bulkForm.person.toUpperCase()] || bulkForm.area} 
                                                    onChange={e => setBulkForm({...bulkForm, area: e.target.value})} placeholder="ÁREA..." />
                                            </div>
                                            <button onClick={handleBulkSubmit} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl shadow-blue-200 transition-all">
                                                Confirmar Entrega Masiva
                                            </button>
                                        </div>

                                        <div className="p-8 md:w-2/3 overflow-y-auto bg-white custom-scrollbar">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Ítems Seleccionados ({selectedIds.size})</h3>
                                            <div className="space-y-3">
                                                {Array.from(selectedIds).map(id => {
                                                    const item = inventory.find(i => i.id === id);
                                                    if(!item) return null;
                                                    return (
                                                        <div key={id} className="flex items-center justify-between p-4 rounded-2xl border border-slate-100 bg-slate-50/50">
                                                            <div className="flex-1">
                                                                <div className="font-black text-slate-800 text-sm uppercase">{item.description}</div>
                                                                <div className="text-[10px] text-slate-400 font-mono font-bold mt-1 tracking-widest">{item.inventoryNum} • {item.brand}</div>
                                                            </div>
                                                            <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
                                                                <span className="text-[9px] font-black text-slate-400">CANT:</span>
                                                                <input type="number" min="1" max={item.quantity} 
                                                                    className="w-12 text-center font-black text-sm outline-none text-blue-600"
                                                                    value={bulkQuantities[id] || 1}
                                                                    onChange={(e) => setBulkQuantities({...bulkQuantities, [id]: e.target.value})}
                                                                />
                                                                <span className="text-[9px] font-black text-slate-300">/ {item.quantity}</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <datalist id="staff-list">
                        {Object.keys(DEFAULT_ASSIGNMENTS).map(key => <option key={key} value={key} />)}
                    </datalist>
                    
                    <datalist id="categories-list">
                        {CATEGORIES_LIST.map(c => <option key={c} value={c} />)}
                    </datalist>
                </div>
            );
        }

        // --- COMPONENTES AUXILIARES ---

        function SideItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all ${active ? 'bg-blue-600 text-white shadow-2xl' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                    {icon} <span className="hidden lg:block font-bold text-sm tracking-tight">{label}</span>
                </button>
            );
        }

        function FilterTab({ label, count, active, onClick, icon }) {
            return (
                <button onClick={onClick} className={`px-5 py-2.5 rounded-2xl flex items-center gap-3 transition-all border-2 whitespace-nowrap ${active ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-500 hover:border-slate-200'}`}>
                    <span className={active ? 'text-blue-400' : 'text-slate-300'}>{icon}</span>
                    <span className="text-[11px] font-black uppercase tracking-widest">{label}</span>
                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-lg ${active ? 'bg-white/10' : 'bg-slate-100 text-slate-500'}`}>{count}</span>
                </button>
            );
        }

        function DashboardView({ stats }) {
            return (
                <div className="grid grid-cols-1 md:grid-cols-4 gap-8 animate-in fade-in slide-in-from-bottom-6">
                    <StatCard label="Stock Total" value={stats.total} icon={<Layers size={28}/>} color="blue" />
                    <StatCard label="Items en Bodega" value={stats.bodega} icon={<Inbox size={28}/>} color="emerald" />
                    <StatCard label="Items Asignados" value={stats.asignado} icon={<UserCheck size={28}/>} color="indigo" />
                    <StatCard label="Alertas Stock" value={stats.bajoStock} icon={<AlertTriangle size={28}/>} color="red" />
                </div>
            );
        }

        function StatCard({ label, value, icon, color }) {
            const themes = {
                blue: "bg-blue-600 text-white shadow-blue-500/20",
                emerald: "bg-emerald-500 text-white shadow-emerald-500/20",
                indigo: "bg-indigo-600 text-white shadow-indigo-500/20",
                red: "bg-red-600 text-white shadow-red-500/20"
            };
            return (
                <div className={`p-8 rounded-[2.5rem] shadow-2xl transition-transform hover:-translate-y-2 ${themes[color]}`}>
                    <div className="p-3 bg-white/20 backdrop-blur-md rounded-2xl w-fit mb-4">{icon}</div>
                    <p className="text-[10px] font-black uppercase tracking-[0.2em] opacity-80 mb-1">{label}</p>
                    <p className="text-4xl font-black tracking-tighter">{value}</p>
                </div>
            );
        }

        function AssetCard({ asset, isStored, onClick, onSelect, isSelected, onPrintLetter }) {
            const isLowStock = isStored && asset.quantity <= LOW_STOCK_THRESHOLD;

            return (
                <div 
                    onClick={onClick}
                    className={`group bg-white p-6 rounded-[2.5rem] border-2 transition-all cursor-pointer flex flex-col gap-5 relative overflow-hidden ${
                        isSelected ? 'border-blue-500 shadow-2xl scale-[1.02]' : 'border-white shadow-xl hover:border-blue-100 hover:shadow-2xl'
                    }`}
                >
                    <div onClick={(e) => { e.stopPropagation(); onSelect(e); }} className={`absolute top-4 right-4 w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${isSelected ? 'bg-blue-600 border-blue-600 text-white' : 'bg-slate-50 border-slate-100'}`}>
                        {isSelected && <CheckCircle2 size={14} />}
                    </div>

                    <div className="flex justify-between items-start">
                        <div className={`flex items-center gap-2 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ${
                            isStored ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'
                        }`}>
                            {isStored ? <Warehouse size={12}/> : <UserCheck size={12}/>}
                            {isStored ? 'Bodega' : 'En Campo'}
                        </div>
                    </div>

                    <div className="flex-1">
                        <span className="text-[10px] font-mono font-bold text-slate-400 block mb-1">#{asset.inventoryNum}</span>
                        <h4 className="text-base font-black text-slate-800 uppercase leading-tight line-clamp-2 mb-3 group-hover:text-blue-600 transition-colors">
                            {asset.description}
                        </h4>
                        
                        {!isStored ? (
                            <div className="bg-orange-50/50 p-3 rounded-2xl border border-orange-100/50 space-y-2">
                                <div className="flex items-center gap-2">
                                    <div className="p-1.5 bg-orange-100 rounded-lg text-orange-600"><User size={14} /></div>
                                    <div>
                                        <p className="text-[9px] font-black text-orange-400 uppercase leading-none mb-0.5">Responsable</p>
                                            <p className="text-[11px] font-bold text-slate-700 uppercase leading-none truncate max-w-[120px]">{asset.manager || asset.RESPONSABLE}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 border-t border-orange-100/50 pt-2">
                                    <div className="p-1.5 bg-orange-100 rounded-lg text-orange-600"><Calendar size={14} /></div>
                                    <div>
                                        <p className="text-[9px] font-black text-orange-400 uppercase leading-none mb-0.5">Fecha Entrega</p>
                                            <p className="text-[11px] font-bold text-slate-700 uppercase leading-none">{formatDate(asset.dateEntrega || asset['FECHA ENTREGA'] || asset['FECHA_ENTREGA'] || asset['Fecha Entrega'] || asset.date) || 'SIN FECHA'}</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        onPrintLetter();
                                    }}
                                    className="mt-2 w-full py-2 bg-indigo-100 text-indigo-700 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-200 transition-all flex items-center justify-center gap-2 border border-indigo-200"
                                >
                                    <Printer size={12}/> Reimprimir Carta
                                </button>
                            </div>
                        ) : (
                            <div className="flex flex-wrap gap-2">
                                <span className="text-[9px] font-bold bg-slate-50 text-slate-500 px-2 py-1 rounded-md uppercase">{asset.brand}</span>
                                <span className="text-[9px] font-bold bg-slate-50 text-slate-500 px-2 py-1 rounded-md uppercase">{asset.category}</span>
                            </div>
                        )}
                    </div>

                    <div className="flex justify-between items-center pt-5 border-t border-slate-50">
                        <div>
                            <p className="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5 tracking-widest">Stock</p>
                            <div className="flex items-baseline gap-1.5">
                                <span className={`text-3xl font-black tracking-tighter ${isLowStock ? 'text-red-600' : 'text-slate-900'}`}>
                                    {asset.quantity}
                                </span>
                                <span className="text-[10px] font-black text-slate-400 uppercase">Unid</span>
                            </div>
                        </div>
                        <div className="p-3.5 bg-slate-50 rounded-[1.2rem] text-slate-300 group-hover:bg-blue-600 group-hover:text-white transition-all">
                            <ChevronRight size={20} strokeWidth={3} />
                        </div>
                    </div>
                </div>
            );
        }

        function AssetDrawer({ 
            asset, isStored, onClose, onPrintPC, onPrintBT, onPrintLetter,
            actionForm, setActionForm, handleMovement, handleAddStock,
            isEditing, setIsEditing, editForm, setEditForm, handleUpdateAsset, startEditing
        }) {
            if (!asset) return null;
            const actionInputRef = useRef(null);

            return (
                <div className="fixed inset-0 z-[100] flex justify-end animate-in fade-in duration-300">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative w-full max-w-lg bg-white h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-500">
                        <div className="p-8 border-b border-slate-100 flex justify-between items-center shrink-0">
                            <div className="flex items-center gap-4">
                                <div className={`p-3 rounded-2xl ${isStored ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}`}><FileText size={24} /></div>
                                <div>
                                    <h2 className="text-xl font-black text-slate-900 uppercase tracking-tighter">Ficha Técnica</h2>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Activo #{asset.inventoryNum}</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {!isEditing && <button onClick={startEditing} className="p-2 hover:bg-blue-50 text-blue-600 rounded-full transition-all"><Edit size={20}/></button>}
                                <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full transition-all text-slate-400"><X size={24}/></button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-10 space-y-8 custom-scrollbar">
                            {isEditing ? (
                                <div className="space-y-4">
                                    <FormInput label="Descripción" value={editForm.description} onChange={val => setEditForm({...editForm, description: val.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <FormInput label="Marca" value={editForm.brand} onChange={val => setEditForm({...editForm, brand: val.toUpperCase()})} />
                                        <FormInput label="Medida" value={editForm.measurement} onChange={val => setEditForm({...editForm, measurement: val.toUpperCase()})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <FormInput label="Color" value={editForm.color} onChange={val => setEditForm({...editForm, color: val.toUpperCase()})} />
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Categoría</label>
                                            <select value={editForm.category} onChange={e => setEditForm({...editForm, category: e.target.value})} className="w-full px-5 py-3.5 bg-slate-50 border-2 border-transparent rounded-2xl outline-none text-sm font-bold uppercase transition-all">
                                                {CATEGORIES_LIST.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button onClick={() => setIsEditing(false)} className="flex-1 py-4 border-2 border-slate-100 rounded-2xl text-xs font-black uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all">Cancelar</button>
                                        <button onClick={handleUpdateAsset} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">Guardar</button>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-900 uppercase leading-tight mb-4">{asset.description}</h3>
                                        <div className="flex flex-wrap gap-2">
                                            <Badge text={asset.brand} />
                                            <Badge text={asset.category} color="blue" />
                                            <Badge text={asset.status} color={asset.status === 'Activo' ? 'emerald' : 'red'} />
                                        </div>
                                    </div>

                                    {!isStored && (
                                        <div className="p-6 rounded-[2rem] border-2 border-orange-100 bg-orange-50/30 space-y-4">
                                            <p className="text-[10px] font-black text-orange-400 uppercase tracking-widest">Información de Asignación</p>
                                            <div className="flex items-center gap-4">
                                                <div className="p-4 bg-white rounded-2xl shadow-sm text-orange-600"><User size={24}/></div>
                                                <div>
                                                    <p className="text-sm font-black text-slate-900 uppercase leading-tight mb-1">{asset.manager || asset.RESPONSABLE}</p>
                                                    <p className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-1"><MapPin size={10}/> {asset.area || asset.AREA || asset.DEPARTAMENTO}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="p-4 bg-white rounded-2xl shadow-sm text-orange-600"><Calendar size={24}/></div>
                                                <div>
                                                    <p className="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-1">Fecha de Entrega</p>
                                                    <p className="text-sm font-black text-slate-700 uppercase leading-tight">{formatDate(asset.dateEntrega || asset['FECHA ENTREGA'] || asset['FECHA_ENTREGA'] || asset['Fecha Entrega'] || asset.date) || 'NO REGISTRADA'}</p>
                                                </div>
                                            </div>
                                            <button onClick={onPrintLetter} className="w-full py-3 bg-white border border-orange-200 text-orange-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-50 transition-all flex items-center justify-center gap-2">
                                                <Printer size={14}/> Re-imprimir Carta
                                            </button>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] pl-2 border-l-2 border-blue-600">Acciones de Movimiento</p>
                                        
                                        {isStored ? (
                                            <div className="space-y-3">
                                                <div className="bg-blue-50/50 p-6 rounded-[2rem] border-2 border-blue-100 space-y-4">
                                                    <div className="flex gap-2">
                                                        <input type="number" min="1" max={asset.quantity} className="w-20 bg-white border-2 border-blue-100 rounded-2xl p-3 text-center font-black text-blue-600 outline-none" value={actionForm.quantity} onChange={e => setActionForm({...actionForm, quantity: e.target.value})} />
                                                        <input ref={actionInputRef} list="staff-list" placeholder="QUIÉN RECIBE..." className="flex-1 bg-white border-2 border-blue-100 rounded-2xl p-3 text-sm font-bold uppercase outline-none focus:border-blue-400" value={actionForm.person} onChange={e => setActionForm({...actionForm, person: e.target.value})} />
                                                    </div>
                                                    <input 
                                                        placeholder="ÁREA / DEPARTAMENTO"
                                                        className="w-full bg-white border-2 border-blue-100 rounded-2xl p-3 text-sm font-bold uppercase outline-none focus:border-blue-400"
                                                        value={actionForm.area || DEFAULT_ASSIGNMENTS[actionForm.person.toUpperCase()] || ''}
                                                        onChange={e => setActionForm({...actionForm, area: e.target.value})}
                                                    />
                                                    <button onClick={() => handleMovement('ASSIGN')} disabled={!actionForm.person} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:opacity-50 transition-all">Confirmar Entrega</button>
                                                </div>

                                                <div className="bg-slate-50/50 p-6 rounded-[2rem] border-2 border-slate-100 space-y-4">
                                                    <div className="flex gap-2">
                                                        <input type="number" min="1" className="w-24 bg-white border-2 border-slate-100 rounded-2xl p-3 text-center font-black outline-none" value={actionForm.stockToAdd} onChange={e => setActionForm({...actionForm, stockToAdd: e.target.value})} />
                                                        <button onClick={handleAddStock} className="flex-1 bg-emerald-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100">Reponer Stock</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="bg-indigo-50/50 p-6 rounded-[2rem] border-2 border-indigo-100 space-y-4">
                                                <div className="flex gap-2">
                                                    <input type="number" min="1" max={asset.quantity} className="w-20 bg-white border-2 border-indigo-100 rounded-2xl p-3 text-center font-black text-indigo-600 outline-none" value={actionForm.quantity} onChange={e => setActionForm({...actionForm, quantity: e.target.value})} />
                                                    <select className="flex-1 bg-white border-2 border-indigo-100 rounded-2xl p-3 text-sm font-bold uppercase outline-none" value={actionForm.area} onChange={e => setActionForm({...actionForm, area: e.target.value})}>
                                                        {BODEGAS_LIST.map(b => <option key={b} value={b}>{b}</option>)}
                                                    </select>
                                                </div>
                                                <button onClick={() => handleMovement('RETURN')} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">Confirmar Devolución</button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] pl-2 border-l-2 border-slate-300">Etiquetas</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={onPrintPC} className="py-4 bg-white border-2 border-slate-100 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 hover:border-slate-300 transition-all"><Printer size={16}/> Imprimir PC</button>
                                            <button onClick={onPrintBT} className="py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 hover:bg-slate-800 transition-all"><Bluetooth size={16}/> Imprimir BT</button>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function HistoryView({ historyData, historySearch, setHistorySearch, onPrint }) {
            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="flex flex-col md:flex-row justify-between items-end gap-4 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                        <div className="flex-1 w-full">
                            <h2 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Historial Personal</h2>
                            <div className="relative">
                                <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20}/>
                                <input type="text" placeholder="BUSCAR MOVIMIENTOS POR NOMBRE..." className="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-100 focus:bg-white outline-none font-bold uppercase text-slate-700 transition-all" value={historySearch} onChange={e => setHistorySearch(e.target.value.toUpperCase())} />
                            </div>
                        </div>
                        <button onClick={onPrint} className="bg-slate-900 text-white px-8 py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-slate-800 transition-all flex items-center gap-3 shadow-xl shadow-slate-200">
                            <Printer size={18}/> Imprimir Reporte
                        </button>
                    </div>

                    <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <tr>
                                        <th className="px-8 py-5">Fecha</th>
                                        <th className="px-8 py-5">Activo</th>
                                        <th className="px-8 py-5">Movimiento</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {historyData.length > 0 ? (
                                        historyData.map((e, i) => (
                                            <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="px-8 py-5">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-500"><Clock size={14}/> {e.dateStr}</div>
                                                </td>
                                                <td className="px-8 py-5">
                                                    <div className="text-blue-600 font-mono font-black text-sm">{e.item.inventoryNum}</div>
                                                    <div className="font-bold text-slate-700 text-xs uppercase mt-0.5">{e.item.description}</div>
                                                </td>
                                                <td className="px-8 py-5">
                                                    <div className="text-xs font-bold text-slate-600 uppercase italic leading-relaxed">{e.action}</div>
                                                </td>
                                            </tr>
                                        ))
                                    ) : (
                                        <tr><td colSpan="3" className="px-8 py-20 text-center text-slate-400 font-bold italic">No se encontraron registros para la búsqueda actual.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function Badge({ text, color = "slate" }) {
            const colors = { 
                slate: "bg-slate-100 text-slate-600", 
                blue: "bg-blue-100 text-blue-600", 
                emerald: "bg-emerald-100 text-emerald-600", 
                red: "bg-red-100 text-red-600", 
                orange: "bg-orange-100 text-orange-600" 
            };
            return <span className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-tight ${colors[color]}`}>{text}</span>;
        }

        function FormInput({ label, value, onChange, type = "text", placeholder, required }) {
            return (
                <div className="space-y-1.5">
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">{label}</label>
                    <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} required={required} className="w-full px-5 py-3.5 bg-slate-50 border-2 border-transparent focus:border-blue-100 focus:bg-white rounded-2xl outline-none text-sm font-bold transition-all uppercase" />
                </div>
            );
        }

        function SkeletonCard() {
            return <div className="bg-white p-8 rounded-[2.5rem] h-64 animate-pulse flex flex-col justify-between border-2 border-white shadow-xl"><div className="w-24 h-5 bg-slate-100 rounded-full"></div><div className="space-y-3"><div className="w-full h-5 bg-slate-100 rounded-lg"></div><div className="w-2/3 h-5 bg-slate-100 rounded-lg"></div></div><div className="w-full h-10 bg-slate-50 rounded-lg"></div></div>;
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } catch (error) {
            document.body.innerHTML = '<div style="padding:20px; color:red;"><h2>Error de Aplicación</h2><pre>' + error.message + '</pre></div>';
            console.error(error);
        }
    </script>
</body>
</html>
